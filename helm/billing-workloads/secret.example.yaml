# Copy this file to secret.yaml and fill in your credentials.
# secret.yaml is gitignored — never commit real secrets.
#
#   cp secret.example.yaml secret.yaml
#
# Helm merges secret.yaml on top of values.yaml (see helm/Makefile).

# ---------------------------------------------------------------------------
# db-cluster  (Percona MySQL)
# ---------------------------------------------------------------------------
db-cluster:
  secrets:
    passwords:
      root: password
      xtrabackup: password
      monitor: password
      clustercheck: password
      proxyadmin: password
      operator: password
      replication: password

# ---------------------------------------------------------------------------
# minio-cluster  (MinIO tenant credentials)
# ---------------------------------------------------------------------------
minio-cluster:
  tenant:
    configSecret:
      accessKey: minio
      secretKey: minio123

# ---------------------------------------------------------------------------
# groundx-secret  (Kubernetes Secret consumed by GroundX and the notebook)
#
# Two different API keys — do not confuse them:
#
#   GROUNDX_ADMIN_API_KEY  → GroundX platform key. Used by the Jupyter
#                            notebook client (get_started.ipynb).
#
#   GROUNDX_AGENT_API_KEY  → OpenAI (or compatible) API key. Used by
#                            GroundX layout/extract agents when calling the
#                            LLM (groundx.extract.agent.serviceType: openai).
# ---------------------------------------------------------------------------
groundx-secret:
  data:
    GROUNDX_ADMIN_EMAIL: support@myco.net
    GROUNDX_ADMIN_API_KEY: "00000000-0000-0000-0000-000000000001"   # GroundX platform key
    GROUNDX_ADMIN_PASSWORD: password
    GROUNDX_ADMIN_USERNAME: "00000000-0000-0000-0000-000000000000"
    GROUNDX_AGENT_API_KEY: sk-CHANGE_ME                              # OpenAI API key for agents
    GROUNDX_LICENSE_KEY: "00000000-0000-0000-0000-000000000002"
    GROUNDX_ACCESS_KEY_ID: minio
    GROUNDX_SECRET_ACCESS_KEY: minio123
    MYSQL_INIT_PASSWORD: password
    MYSQL_INIT_USER: root
    MYSQL_USER: eyelevel
    MYSQL_PASSWORD: password

# ---------------------------------------------------------------------------
# groundx
# ---------------------------------------------------------------------------
groundx:
  licenseKey: "00000000-0000-0000-0000-000000000000"

# ---------------------------------------------------------------------------
# notebook  (MinIO credentials for the OpenShift AI data connection)
# ---------------------------------------------------------------------------
notebook:
  minio:
    accessKey: "minio"
    secretKey: "minio123"

# ---------------------------------------------------------------------------
# llm-service  (optional — only needed for gated Hugging Face models)
# Set llm-service.enabled: true in values.yaml to deploy.
# ---------------------------------------------------------------------------
llm-service:
  secret:
    hf_token: ""
