{{- if .Values.frontend.enabled }}
# Streamlit frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "billing-workloads.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "billing-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "billing-workloads.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      {{- with .Values.frontend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "billing-workloads.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.frontend.image.pullSecrets }}
      # Pull secrets for the container image registry
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "billing-workloads.serviceAccountName" . }}
      # Pod-level security context (e.g. fsGroup)
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      containers:
        - name: streamlit
          # Container-level security context (e.g. runAsUser)
          securityContext:
            {{- toYaml .Values.frontend.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.port }}
              protocol: TCP
          # Streamlit health check endpoint
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          # Environment variables injected from the secret for GroundX connectivity
          env:
            - name: GROUNDX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.frontend.groundx.secretName }}
                  key: GROUNDX_ADMIN_API_KEY
            # Defaults to the in-cluster GroundX service (same namespace) so the
            # UI never falls back to the SaaS API. Override with frontend.groundx.baseUrl.
            - name: GROUNDX_BASE_URL
              value: {{ .Values.frontend.groundx.baseUrl | default (printf "http://groundx.%s.svc.cluster.local/api" .Release.Namespace) | quote }}
            - name: GROUNDX_PROJECT_ID
              value: {{ .Values.frontend.groundx.projectId | quote }}
            # Where processed submissions (job + extracted data) are persisted
            - name: SUBMISSIONS_DIR
              value: /app/data/submissions
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          # Persist submissions so extracted data can be tracked across restarts.
          # Prompt YAMLs and manager.py are baked into the image at /app
          # (apps/ui Streamlit entrypoint; matching the notebook layout).
          volumeMounts:
            - name: submissions
              mountPath: /app/data/submissions
      volumes:
        - name: submissions
          {{- if .Values.frontend.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "billing-workloads.fullname" . }}-submissions
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}