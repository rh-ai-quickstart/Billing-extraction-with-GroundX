# Billing Workloads - This is the actual application pods. To be installed after the billing-operators. 

global:
  # Set to true when deploying on OpenShift / OpenShift AI
  openshift: true
# Container image for cleanup hook Jobs
job:
  image: quay.io/openshift/origin-cli:latest

# MinIO Route targets.
minio:
  api:
    serviceName: minio
    targetPort: http-minio
  console:
    serviceName: minio-tenant-console
    targetPort: http-console

# ServiceAccount used by cleanup hook Jobs
serviceAccount:
  create: true
  name: ""
  clusterRole: cluster-admin

# Whether to delete the OpenShift project on helm uninstall
deleteProject: true

logLevel: debug
# ---------------------------------------------------------------------------
# db-cluster  (alias for percona/pxc-db)
# mirrors: values/values.percona.cluster.yaml
# ---------------------------------------------------------------------------
db-cluster:
  nameOverride: db-cluster
  fullnameOverride: db-cluster
  backup:
    enabled: false
    nodeSelector:
      node: eyelevel-node
  haproxy:
    enabled: true
    nodeSelector:
      node: eyelevel-node
    resources:
      requests:
        cpu: 600m
        memory: 1Gi
    size: 1
  logcollector:
    enabled: false
    nodeSelector:
      node: eyelevel-node
  nodeSelector:
    node: eyelevel-node
  pmm:
    enabled: false
    nodeSelector:
      node: eyelevel-node
  proxysql:
    enabled: false
    nodeSelector:
      node: eyelevel-node
  pxc:
    nodeSelector:
      node: eyelevel-node
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 600m
        memory: 512Mi
    size: 1
  # Passwords: copy secret.example.yaml → secret.yaml (see helm/billing-workloads/)
  unsafeFlags:
    pxcSize: true
    proxySize: true

# ---------------------------------------------------------------------------
# minio-cluster  (alias for minio-operator/tenant)
# mirrors: values/values.minio.tenant.yaml
# ---------------------------------------------------------------------------
minio-cluster:
  tenant:
    certificate:
      requestAutoCert: false
    # configSecret (accessKey, secretKey): see secret.example.yaml → secret.yaml
    containerSecurityContext: null
    name: minio-tenant
    nodeSelector:
      node: eyelevel-node
    podSecurityContext: null
    securityContext: null
    pools:
      - name: minio-tenant-pool-0
        containerSecurityContext: null
        nodeSelector:
          node: eyelevel-node
        podSecurityContext: null
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext: null
        servers: 1
        size: 20Gi
        storageClassName: eyelevel-pv
        volumesPerServer: 1

# ---------------------------------------------------------------------------
# stream-cluster  (alias for groundx-strimzi-kafka-cluster)
# mirrors: values/values.strimzi.cluster.yaml
# ---------------------------------------------------------------------------
stream-cluster:
  node: eyelevel-node
  enabled: true
  cluster:
    version: 4.1.0  # Strimzi operator supports [4.0.0, 4.1.0]
    metaVersion: "4.1"

# ---------------------------------------------------------------------------
# groundx-secret
# Credential data: copy secret.example.yaml → secret.yaml
# ---------------------------------------------------------------------------
groundx-secret:
  name: eyelevel-secret-credentials
  namespace: eyelevel

# ---------------------------------------------------------------------------
# groundx
# mirrors: values/values.groundx.yaml
# ---------------------------------------------------------------------------
groundx:
  # licenseKey: see secret.example.yaml → secret.yaml
  mode: ingest
  cluster:
    pvClass: eyelevel-pv
    pvAccessMode: ReadWriteOnce
    type: openshift
    imagePullPolicy: Always
    secrets:
      - eyelevel-secret-credentials
    preProcessors:
      - processorId: 13
        type: extract
    nodeLabels:
      cpuMemory: eyelevel-node
      cpuOnly: eyelevel-node
      gpuLayout: eyelevel-node
      gpuRanker: eyelevel-node
      gpuSummary: eyelevel-node
  file:
    customDomain: minio
  groundx:
    serviceType: Route
  engines:
    default:
      engineId: gpt-5-mini
      vision: true
  summary:
    existing:
      serviceType: openai-base64
  # ── Layout inference GPU configuration ───────────────────────────────
  #
  # To make GroundX use a GPU for layout inference, add a resources block
  # under layout.inference with nvidia.com/gpu set to '1': (This is the default)
  #
  #   layout:
  #     inference:
  #       resources:
  #         limits:
  #           memory: 12Gi
  #           nvidia.com/gpu: '1'
  #         requests:
  #           cpu: 500m
  #           memory: 2Gi
  #           nvidia.com/gpu: '1'
  #
  # To run layout inference without a GPU (CPU-only), set nvidia.com/gpu
  # to '0':
  #
  #   layout:
  #     inference:
  #       resources:
  #         limits:
  #           memory: 12Gi
  #           nvidia.com/gpu: '0'
  #         requests:
  #           cpu: 500m
  #           memory: 2Gi
  #           nvidia.com/gpu: '0'
  #
  layout:
    inference:
      deviceType: cpu
      enabled: true
      imagePullPolicy: Always
      resources:
        limits:
          memory: 12Gi
          nvidia.com/gpu: '0'
        requests:
          cpu: 500m
          memory: 2Gi
          nvidia.com/gpu: '0'
      tolerations:
        - key: cpu-taint
          operator: Exists
          effect: NoSchedule
    api:
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
  # ── Ranker inference GPU configuration ───────────────────────────────
  # GroundX chart defaults ranker.inference to nvidia.com/gpu: 1,
  # deviceType: cuda, workers: 14, and memory: 1Gi (GPU holds model weights).
  # On CPU the model loads into RAM — use fewer workers and more memory.
  ranker:
    inference:
      deviceType: cpu
      workers: 2
      resources:
        limits:
          memory: 8Gi
          nvidia.com/gpu: '0'
        requests:
          cpu: 1500m
          memory: 4Gi
          nvidia.com/gpu: '0'
  extract:
    enabled: true
    agent:
      enabled: true
      serviceType: openai
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
    api:
      enabled: true
      serviceType: Route
      timeout: 300
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
    download:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
    save:
      enabled: true
      resources:
        requests:
          cpu: 1
          memory: 1Gi

# ---------------------------------------------------------------------------
# notebook – OpenShift AI Workbench (Jupyter Notebook)
# Deploys a kubeflow.org/v1 Notebook CR on OpenShift AI.
# Requires global.openshift: true to create OpenShift-specific resources.
# ---------------------------------------------------------------------------
notebook:
  enabled: true
  username: "rjjohnso@redhat.com"
  podSecurityContext:
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"
  containerSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
  image:
    repository: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-minimal-notebook
    tag: "2025.2"
    pullPolicy: Always
  resources:
    limits:
      cpu: "2"
      memory: "8Gi"
    requests:
      cpu: "1"
      memory: "4Gi"
  storage:
    size: 20Gi
    storageClassName: ""   # Leave blank to use the cluster default StorageClass
  shm:
    enabled: true
    size: 2Gi
  groundx:
    # The API key is read from the eyelevel-secret-credentials Secret
    # (created by the groundx-secret subchart) — no need to duplicate it here.
    secretName: "eyelevel-secret-credentials"
    # Optional override for GROUNDX_BASE_URL. When empty, the chart sets an
    # in-cluster URL: http://<groundx.groundx.serviceName>.<ns>.svc.cluster.local/api
    # Set only if the notebook must use an external OpenShift Route or HTTPS URL.
    baseUrl: ""
  minio:
    # accessKey, secretKey: see secret.example.yaml → secret.yaml
    endpoint: ""          # e.g. https://minio-api-<namespace>.apps.<cluster-domain>
    region: "us-east-1"
    defaultBucket: "billing-artifacts"
  openshiftAI:
    dataConnections:
      enabled: true
  gitClone:
    enabled: true
    repository: "https://github.com/rh-ai-quickstart/Billing-extraction-with-GroundX.git"
    revision: "main"      # branch, tag, or commit SHA
    targetDir: "Billing-extraction-with-GroundX"
    depth: 1
    cloneRetries: 5
    waitTimeoutSeconds: 900
    image:
      repository: alpine/git
      tag: "2.47.2"
      pullPolicy: IfNotPresent
    forceReset: false

# ---------------------------------------------------------------------------
# frontend – Streamlit UI for Billing Extraction
# ---------------------------------------------------------------------------
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/rh-ai-quickstart/groundx-ui
    tag: "latest"
    pullPolicy: Always
    pullSecrets: []
  service:
    type: ClusterIP
    port: 8501
  route:
    host: ""
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  groundx:
    secretName: "eyelevel-secret-credentials"
    # Empty = use the in-cluster GroundX service (http://groundx.<ns>.svc.cluster.local/api).
    # Override only to point at an external Route or a different GroundX instance.
    baseUrl: ""
    projectId: "" # Set to your specific GroundX project ID if needed
  # Persist submission history (extracted data by job) across pod restarts
  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: "" # Use the cluster default when empty
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: 200m
      memory: 512Mi
  podSecurityContext:
    fsGroup: 1001
  containerSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

